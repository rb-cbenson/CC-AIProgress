<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Progress Dashboard</title>
  <meta name="description" content="Track AI tools, news, regulations, and workflows — all in one place">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4361ee">
  <style>body{margin:0}.loading{display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#64748b}</style>
</head>
<body>
  <button class="sidebar-toggle" aria-label="Toggle navigation">☰</button>
  <div class="dashboard-wrapper">
    <nav class="sidebar">
      <div class="sidebar-brand">
        <h1>AI Progress</h1>
        <small>Track · Compare · Test</small>
      </div>
      <ul class="sidebar-nav">
        <li><a href="#command-center" class="active" data-tab="command-center" onclick="nav('command-center')">
          <span class="nav-icon" style="font-size:16px;width:20px;text-align:center">&#129504;</span>
          Command Center
        </a></li>
        <li><a href="#try-this" data-tab="try-this" onclick="nav('try-this')">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Try This ASAP
        </a></li>
        <li><a href="#tools">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          AI Tools
        </a></li>
        <li><a href="#rankings">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
          Tool Rankings
        </a></li>
        <li><a href="#news">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
          AI News
        </a></li>
        <li><a href="#workflows">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          Workflows
        </a></li>
        <li><a href="#strategies" data-tab="strategies" onclick="nav('strategies')">
          <span class="nav-icon" style="font-size:16px;width:20px;text-align:center">&#129504;</span>
          Strategies
        </a></li>
        <li><a href="#about">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          About & Settings
        </a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="view-toggle" data-tooltip="Change card density">
          <button class="view-btn active" data-view="compact" title="Compact view">S</button>
          <button class="view-btn" data-view="normal" title="Normal view">M</button>
          <button class="view-btn" data-view="large" title="Large view">L</button>
        </div>
        <button id="theme-toggle-btn" class="theme-btn">🌙 Dark Mode</button>
      </div>
    </nav>

    <main class="main-content">
      <div id="tab-command-center" class="tab-content active"></div>
      <div id="tab-try-this" class="tab-content">
        <div class="loading">Loading dashboard...</div>
      </div>
      <div id="tab-tools" class="tab-content"></div>
      <div id="tab-news" class="tab-content"></div>
      <div id="tab-rankings" class="tab-content"></div>
      <div id="tab-workflows" class="tab-content"></div>
      <div id="tab-strategies" class="tab-content"></div>
      <div id="tab-about" class="tab-content"></div>
      <footer class="dashboard-footer" id="dashboard-footer">AI Progress Dashboard · Loading...</footer>
    </main>
  </div>

  <!-- Tooltip element -->
  <div id="tooltip" class="tooltip-popup"></div>

  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.1/dist/apexcharts.min.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
